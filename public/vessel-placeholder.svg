<svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hullGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#354a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2530;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deckGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4d7090;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d5060;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="superstructureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7a90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a5070;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.3" />
    </filter>
    <pattern id="waterOverlay" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#1a2f45" opacity="0.2" />
    </pattern>
  </defs>

  <!-- Water reflection hint -->
  <rect width="280" height="280" fill="#060d1a" />

  <!-- Subtle water surface -->
  <ellipse cx="140" cy="220" rx="120" ry="35" fill="#0a1422" opacity="0.6" />
  <path d="M 40 215 Q 80 218, 140 217 T 240 215" stroke="#1a3a50" stroke-width="1" fill="none" opacity="0.4" />
  <path d="M 35 225 Q 90 228, 140 227 T 245 225" stroke="#0f2030" stroke-width="0.5" fill="none" opacity="0.3" />

  <!-- Main hull body (3/4 view) -->
  <g filter="url(#shadow)">
    <!-- Port (left) side of hull -->
    <path d="M 60 140 L 55 200 Q 60 215 80 220 L 100 220 L 105 140 Z"
          fill="url(#hullGrad)" stroke="#1a2530" stroke-width="0.5" />

    <!-- Starboard (right) side of hull - lighter -->
    <path d="M 105 140 L 100 200 Q 105 215 125 220 L 220 220 Q 235 215 240 200 L 220 140 Z"
          fill="#2a3a4a" stroke="#1a2530" stroke-width="0.5" opacity="0.95" />

    <!-- Waterline - red stripe -->
    <ellipse cx="140" cy="207" rx="90" ry="8" fill="#c93838" opacity="0.85" />
    <ellipse cx="140" cy="206" rx="90" ry="6" fill="#e84a4a" opacity="0.4" />

    <!-- Deck area -->
    <path d="M 60 140 L 220 140 L 215 165 L 65 165 Z"
          fill="url(#deckGrad)" stroke="#2a3a4a" stroke-width="0.5" />

    <!-- Tank sections (2 large tanks and smaller sections) -->
    <!-- Front tank -->
    <ellipse cx="95" cy="155" rx="22" ry="14" fill="#3a5060" opacity="0.7" stroke="#2a3a4a" stroke-width="0.5" />
    <ellipse cx="95" cy="152" rx="20" ry="10" fill="#4a6070" opacity="0.5" />

    <!-- Middle tank (largest) -->
    <ellipse cx="150" cy="152" rx="35" ry="15" fill="#3a5060" opacity="0.7" stroke="#2a3a4a" stroke-width="0.5" />
    <ellipse cx="150" cy="150" rx="33" ry="12" fill="#4a6070" opacity="0.5" />

    <!-- Aft tank -->
    <ellipse cx="195" cy="155" rx="20" ry="14" fill="#3a5060" opacity="0.7" stroke="#2a3a4a" stroke-width="0.5" />
    <ellipse cx="195" cy="152" rx="18" ry="10" fill="#4a6070" opacity="0.5" />

    <!-- Manifold/pipe structure (center) -->
    <g opacity="0.6">
      <rect x="138" y="145" width="4" height="22" fill="#2a3a4a" rx="2" />
      <rect x="135" y="150" width="10" height="2" fill="#3a4a5a" />
      <rect x="135" y="158" width="10" height="2" fill="#3a4a5a" />
      <circle cx="140" cy="160" r="2.5" fill="#4a5a6a" stroke="#2a3a4a" stroke-width="0.5" />
    </g>

    <!-- Bridge/superstructure (aft port side) -->
    <path d="M 175 125 L 190 115 L 210 120 L 215 140 L 195 138 Z"
          fill="url(#superstructureGrad)" stroke="#2a3a4a" stroke-width="0.5" />

    <!-- Bridge deck/cabin structure -->
    <rect x="185" y="118" width="18" height="12" fill="#5a7a90" opacity="0.8" stroke="#2a3a4a" stroke-width="0.5" />

    <!-- Windows (bridge) -->
    <rect x="187" y="120" width="3" height="3" fill="#1a2a3a" opacity="0.7" />
    <rect x="193" y="120" width="3" height="3" fill="#1a2a3a" opacity="0.7" />
    <rect x="199" y="120" width="3" height="3" fill="#1a2a3a" opacity="0.7" />
    <rect x="187" y="125" width="3" height="2" fill="#1a2a3a" opacity="0.6" />
    <rect x="199" y="125" width="3" height="2" fill="#1a2a3a" opacity="0.6" />

    <!-- Mast/antenna structure -->
    <line x1="200" y1="115" x2="200" y2="100" stroke="#3a4a5a" stroke-width="1.5" />
    <circle cx="200" cy="98" r="2" fill="#4a5a6a" />
    <line x1="198" y1="105" x2="202" y2="105" stroke="#3a4a5a" stroke-width="0.5" opacity="0.6" />

    <!-- Anchor/mooring hardware (bow area) -->
    <circle cx="70" cy="145" r="2" fill="#4a5a6a" stroke="#2a3a4a" stroke-width="0.5" />
    <circle cx="75" cy="148" r="1.5" fill="#4a5a6a" stroke="#2a3a4a" stroke-width="0.5" />

    <!-- Subtle riveting/panel lines -->
    <g stroke="#1a2530" stroke-width="0.3" opacity="0.3">
      <line x1="100" y1="155" x2="190" y2="155" />
      <line x1="100" y1="160" x2="190" y2="160" />
      <line x1="110" y1="170" x2="180" y2="170" />
    </g>
  </g>

  <!-- "Photo unavailable" overlay text -->
  <g opacity="0.35">
    <text x="140" y="245" font-family="JetBrains Mono, monospace" font-size="10" font-weight="400"
          fill="#6a8a9a" text-anchor="middle" letter-spacing="0.5">
      Photo unavailable
    </text>
  </g>

  <!-- Subtle vignette -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#060d1a;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#060d1a;stop-opacity:0.15" />
    </radialGradient>
  </defs>
  <rect width="280" height="280" fill="url(#vignette)" pointer-events="none" />
</svg>
